<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>理解詞語</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f3e6;
  --panel:#efe5c8;
  --panel-2:#e3d5a9;
  --paper:#fffcf5;
  --paper-2:#f3ead4;
  --paper-line:#e0d3ab;
  --seal:#a3311d;
  --seal-2:#c14a33;
  --seal-soft:#e9cfc5;
  --indigo:#3a5a78;
  --gold:#b6862a;
  --gold-2:#dba53e;
  --text:#2a2622;
  --muted:#8a7c62;
  --radius:14px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    radial-gradient(circle at 15% 0%, rgba(182,134,42,.10), transparent 40%),
    radial-gradient(circle at 90% 10%, rgba(163,49,29,.07), transparent 45%),
    var(--bg);
  color:var(--text);
  font-family:'Noto Sans TC', sans-serif;
  line-height:1.7;
}
h1,h2,h3,.serif{ font-family:'Noto Serif TC', serif; }
.mono{ font-family:'JetBrains Mono', monospace; letter-spacing:.04em; }

/* ---------- layout shell ---------- */
.app{ display:flex; max-width:1280px; margin:0 auto; align-items:flex-start; }
.railwrap{ position:sticky; top:0; height:100vh; flex:0 0 220px; padding:26px 10px 26px 22px; display:flex; flex-direction:column; }
.rail{ display:flex; flex-direction:column; gap:6px; margin-top:18px; overflow-y:auto; }
.rail-title{ font-size:12px; color:var(--muted); letter-spacing:.15em; }
.tab{
  display:flex; align-items:center; gap:10px;
  background:var(--panel); border:1px solid var(--paper-line);
  border-left:4px solid var(--tab-c, var(--gold));
  border-radius:0 8px 8px 0;
  padding:10px 12px; cursor:pointer; text-align:left;
  color:var(--text); font-size:14px; transition:.2s;
}
.tab:hover{ background:var(--panel-2); transform:translateX(2px); }
.tab.active{ background:linear-gradient(90deg, rgba(182,134,42,.20), var(--panel)); border-left-width:6px; }
.tab small{ display:block; color:var(--muted); font-size:11px; }

.score-badge{
  margin-top:auto; background:var(--seal); color:#fbeee7; border-radius:50%;
  width:96px; height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  border:3px solid rgba(251,238,231,.7); transform:rotate(-6deg);
  box-shadow:0 6px 18px rgba(0,0,0,.15);
  font-family:'Noto Serif TC',serif;
}
.score-badge .n{ font-size:22px; font-weight:900; }
.score-badge .l{ font-size:10px; letter-spacing:.15em; }

main{ flex:1; min-width:0; padding:40px 28px 120px; }

/* ---------- hero ---------- */
.hero{ position:relative; padding:44px 40px; margin-bottom:56px; border-radius:20px;
  background:
    radial-gradient(ellipse 420px 260px at 82% 15%, rgba(74,69,58,.10), transparent 70%),
    radial-gradient(ellipse 300px 200px at 95% 85%, rgba(74,69,58,.07), transparent 70%),
    radial-gradient(ellipse 260px 180px at 10% 90%, rgba(74,69,58,.06), transparent 70%),
    linear-gradient(155deg, #f3ead4, #ece0bf);
  border:1px solid var(--paper-line); overflow:hidden;
}
.hero::before{ content:"印"; position:absolute; right:10px; bottom:-14px;
  font-family:'Noto Serif TC',serif; font-weight:900; font-size:120px; line-height:1;
  color:var(--seal); opacity:.85; pointer-events:none;
  -webkit-text-stroke:0; mix-blend-mode:multiply; opacity:.10;
}
.eyebrow{ display:inline-flex; align-items:center; gap:8px; color:var(--seal); font-size:12px; letter-spacing:.2em; margin-bottom:14px;}
.eyebrow::before{ content:""; width:22px; height:1px; background:var(--seal); }
.hero h1{ font-size:clamp(40px,6vw,64px); margin:0 0 12px; font-weight:900;
  background:linear-gradient(100deg, #2a2622 0%, #4a453c 55%, #6b6353 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  position:relative; z-index:1;
}
.hero p{ max-width:620px; color:var(--muted); font-size:15px; margin:0 0 22px;}
.hero-stats{ display:flex; gap:14px; flex-wrap:wrap; }
.hstat{ background:var(--paper); border:1px solid var(--paper-line); padding:10px 16px; border-radius:10px; font-size:13px; }
.hstat b{ color:var(--seal); display:block; font-size:20px; font-family:'Noto Serif TC',serif; }

/* ---------- section (page) ---------- */
.station{ scroll-margin-top:24px; margin-bottom:64px; }
.station-head{ display:flex; align-items:baseline; gap:14px; margin-bottom:6px; }
.station-num{ font-size:13px; color:var(--tab-c,var(--seal)); }
.station h2{ font-size:26px; margin:0; color:var(--text); }
.station-desc{ color:var(--muted); font-size:14px; max-width:720px; margin-bottom:20px; }

.page{
  background:var(--paper); color:var(--text); border-radius:var(--radius);
  padding:26px 28px; box-shadow:0 10px 24px rgba(58,45,20,.08), 0 0 0 1px var(--paper-line);
  position:relative;
}
.page + .page{ margin-top:18px; }
.page::after{ content:""; position:absolute; left:14px; right:14px; bottom:-8px; height:8px;
  background:var(--paper-2); border-radius:0 0 10px 10px; z-index:-1; opacity:.8; }

details.ref{ margin-bottom:4px; }
details.ref > summary{
  cursor:pointer; list-style:none; display:flex; align-items:center; gap:10px;
  font-family:'Noto Serif TC',serif; font-weight:700; font-size:15px; color:var(--text);
  padding:6px 0; border-bottom:1px dashed var(--paper-line);
}
details.ref > summary::-webkit-details-marker{ display:none; }
details.ref > summary::before{ content:"▸"; color:var(--seal); transition:.2s; }
details.ref[open] > summary::before{ transform:rotate(90deg); }

.tbl-wrap{ overflow-x:auto; margin:14px 0 6px; }
table.ref-table{ width:100%; border-collapse:collapse; font-size:13.5px; }
table.ref-table th{ text-align:left; background:var(--paper-2); padding:8px 10px; color:var(--text); font-family:'Noto Serif TC',serif; border-bottom:2px solid var(--seal); }
table.ref-table td{ padding:7px 10px; border-bottom:1px solid var(--paper-line); vertical-align:top; }
table.ref-table tr:hover td{ background:rgba(163,49,29,.05); }
.term{ color:var(--seal); font-weight:700; white-space:nowrap; }

.note{ background:rgba(58,90,120,.08); border-left:3px solid var(--indigo); padding:10px 14px; border-radius:0 8px 8px 0; font-size:13.5px; margin:14px 0; }

/* ---------- quiz ---------- */
.quiz-box{ margin-top:22px; }
.quiz-box h3{ font-size:17px; margin:0 0 4px; color:var(--text); display:flex; align-items:center; gap:8px;}
.quiz-box h3::before{ content:"筆"; font-family:'Noto Serif TC',serif; background:var(--seal); color:#fff; width:26px; height:26px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:13px; }
.qcount{ font-size:12px; color:var(--muted); margin-bottom:14px; }

.q-card{ border:1px solid var(--paper-line); border-radius:10px; padding:14px 16px; margin-bottom:12px; background:#fffdf9; }
.q-text{ font-weight:500; margin-bottom:10px; font-size:14.5px; }
.q-text .blank{ color:var(--seal); font-weight:700; border-bottom:1px dotted var(--seal); padding:0 2px;}
.opts{ display:grid; gap:8px; }
.opt{
  text-align:left; background:#fff; border:1px solid var(--paper-line); border-radius:8px;
  padding:9px 12px; cursor:pointer; font-size:13.5px; color:var(--text); transition:.15s;
  display:flex; gap:8px; align-items:flex-start;
}
.opt:hover{ border-color:var(--seal); background:#fff7ef; }
.opt.correct{ background:#fbeee6; border-color:var(--seal); color:#7a2417; }
.opt.wrong{ background:#efece4; border-color:#57514a; color:#4a453c; }
.opt.disabled{ pointer-events:none; opacity:.85; }
.stamp{ font-size:12px; font-weight:900; border-radius:50%; width:20px; height:20px; flex:0 0 20px; display:flex; align-items:center; justify-content:center;}
.stamp.c{ background:var(--seal); color:#fff; }
.stamp.w{ background:#57514a; color:#fff; }
.feedback{ margin-top:8px; font-size:12.5px; color:#6b6045; display:none; }
.feedback.show{ display:block; }

.station-score{ font-size:12.5px; color:var(--muted); margin-top:10px; display:flex; align-items:center; gap:8px; }
.mini-seal{ width:22px; height:22px; border-radius:4px; background:var(--seal); color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:10px; transform:rotate(-8deg); font-family:'Noto Serif TC',serif; }

footer{ text-align:center; padding:40px 20px 60px; color:var(--muted); font-size:12.5px; }
.reset-btn{ background:var(--seal); color:#fff; border:none; padding:10px 22px; border-radius:30px; font-size:13px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; margin-top:14px; }
.reset-btn:hover{ background:var(--seal-2); }

@media (max-width: 900px){
  .app{ flex-direction:column; }
  .railwrap{ position:sticky; top:0; z-index:20; height:auto; width:100%; padding:14px 14px 10px; background:var(--bg); flex-direction:row; align-items:center; }
  .rail{ flex-direction:row; overflow-x:auto; margin-top:0; padding-bottom:4px; }
  .rail-title{ display:none; }
  .tab{ flex:0 0 auto; border-left:none; border-bottom:4px solid var(--tab-c,var(--gold)); border-radius:8px 8px 0 0; }
  .tab small{ display:none; }
  .score-badge{ display:none; }
  main{ padding:24px 16px 100px; }
  .hero{ padding:28px 20px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="railwrap">
    <div class="rail-title mono">單元伍 導覽</div>
    <div class="rail" id="rail"></div>
    <div class="score-badge" id="scoreBadge">
      <div class="n" id="scoreN">0/0</div>
      <div class="l">戰績</div>
    </div>
  </div>

  <main>
    <div class="hero">
      <div class="eyebrow mono">會考實力養成</div>
      <h1>理解詞語</h1>
      <p>依照講義內容整理成七個練習站：狀聲詞、敬詞謙詞、慣用語、一詞多義、容易混淆的詞語、偏義複詞、一般常用詞語。每站先看懂概念與對照表，再動手做題，答對蓋章、答錯留下墨痕，練到熟練為止。</p>
      <div class="hero-stats">
        <div class="hstat"><b>7</b>練習站</div>
        <div class="hstat"><b id="totalQ">0</b>題互動測驗</div>
        <div class="hstat"><b>200+</b>詞語對照</div>
      </div>
    </div>

    <div id="stations"></div>

    <footer>
      依你的講義內容製作・答錯不要緊，蓋章蓋滿再走。
      <br><button class="reset-btn" onclick="resetAll()">重新測驗全部</button>
    </footer>
  </main>
</div>

<script>
/* =========================================================
   DATA
   ========================================================= */
const STATIONS = [
{
  id:"s1", num:"第1站", color:"#3a5a78", title:"狀聲詞",
  desc:"判斷原則：①主詞是會發出聲音的人或物　②從上下文詞義判斷是否真的在描述「聲音」。",
  refs:[
    {
      title:"常見狀聲詞分類",
      cols:["類別","狀聲詞","舉例"],
      rows:[
        ["風聲","颼颼／蕭蕭／撲簌簌／颯颯","冷風颼颼；風蕭蕭兮易水寒"],
        ["雨聲","淅瀝","雨淅淅瀝瀝下個不停"],
        ["流水聲","潺潺／淙淙／潑潑","但聞黃河流水鳴濺濺"],
        ["波濤聲","澎湃","怒濤澎湃"],
        ["打雷聲","隆隆","雷聲隆隆"],
        ["鳥鳴聲","關關／啞啞／吱吱喳喳","關關雎鳩，在河之洲"],
        ["馬蹄聲／群馬鳴叫聲","達達／啾啾","我達達的馬蹄是美麗的錯誤"],
        ["讀書聲","琅琅","琅琅上口"],
        ["讚美聲","嘖嘖","嘖嘖稱奇"],
        ["哀號聲","嗷嗷","嗷嗷待哺"],
        ["小孩哭聲","呱呱","呱呱墜地"],
        ["幼兒學語聲","牙牙","牙牙學語"],
        ["空腹鳴叫聲","轆轆","飢腸轆轆"],
        ["織布聲","唧唧","唧唧復唧唧"],
        ["磨刀聲","霍霍","磨刀霍霍向豬羊"],
        ["金屬撞擊聲","鏗鏘／鏦鏦","鏗鏘有力"],
        ["火燒爆裂聲","必必剝剝","必必剝剝的爐火"],
        ["細碎斷續聲","窸窣","草叢裡傳來窸窣的聲響"]
      ]
    },
    {
      title:"迷思澄清：這些疊字都「不是」狀聲詞",
      cols:["詞語","實際意思"],
      rows:[
        ["翩翩起舞","動作輕盈"],
        ["冉冉上升","緩慢地移動"],
        ["滔滔不絕","話多而連續不斷"],
        ["涓涓細流","細水慢流的樣子"],
        ["裊裊炊煙","縈迴繚繞的樣子"],
        ["淚流潸潸","淚流不止的樣子"],
        ["殺氣騰騰","旺盛的樣子"],
        ["熙熙攘攘","人多而喧鬧紛雜的樣子"]
      ]
    }
  ],
  quiz:[
    q("下列「　」中的疊字，何者是描摹聲音的狀聲詞？",
      ["溪水「潺潺」流過山谷","炊煙「裊裊」升起","他「翩翩」起舞，姿態優雅","人群「熙熙攘攘」，十分熱鬧"], 0,
      "「潺潺」形容流水聲，其餘皆非狀聲詞：裊裊形容縈繞樣、翩翩形容輕盈動作、熙熙攘攘形容人多喧鬧。"),
    q("下列「　」中的詞語，何者不是狀聲詞？",

      "「冉冉」形容緩慢移動，不是聲音；其餘皆為狀聲詞。"),
    q("「淚流『　』」要表示哭泣不止，且是狀聲詞，應填入？",
      ["潸潸","涓涓","淅瀝","琅琅"], 2,

    q("下列何組「　」中的疊字，皆為狀聲詞？",
      ["「達達」馬蹄／「唧唧」織布聲","「滔滔」不絕／「涓涓」細流","「熙熙」攘攘／「翩翩」起舞","「殺氣」騰騰／淚流「潸潸」"], 0,
      "達達（馬蹄聲）與唧唧（織布聲）皆為狀聲詞；其餘選項皆非狀聲詞。"),
    q("形容磨刀聲的狀聲詞是？",
      ["霍霍","轆轆","琅琅","嗷嗷"], 0,
      "「磨刀霍霍向豬羊」，霍霍為磨刀聲。"),
    q("「關關雎鳩，在河之洲」中的「關關」是描摹何種聲音？",
      ["流水聲","鳥鳴聲","雷聲","風聲"], 1,
      "關關為雎鳩鳥的鳴叫聲，屬鳥鳴聲類狀聲詞。"),
    q("下列何者是「空腹鳴叫聲」的狀聲詞？",
      ["轆轆","唧唧","嗷嗷","窸窣"], 0,
      "「飢腸轆轆」，轆轆形容肚子餓時發出的聲音。"),
    q("下列「　」中何者不是狀聲詞？",
      ["「窸窣」作響","話「滔滔」不絕","流水「淙淙」","雷聲「隆隆」"], 1,
      "「滔滔不絕」形容話多連續不斷，非狀聲詞；其餘皆為狀聲詞。")
  ]
},
{
  id:"s2", num:"第2站", color:"#b6862a", title:"敬詞、謙詞",
  desc:"敬詞：稱呼對方，表示尊敬；謙詞：稱呼自己，表示謙虛；禮貌詞：交際場合中的客套用語。",
  refs:[
    { title:"敬詞（稱對方）", cols:["敬詞","釋義"],
      rows:[["君","敬稱對方，相當於「您」"],["卿","君稱臣／同輩敬稱／夫妻情人親暱稱呼"],["大人","對有身分地位者的敬稱"],["閣下","對人的敬稱"],["陛下","對君王的敬稱"],["麾下","對將帥的敬稱"],["足下","對同輩的敬稱"],["兄臺","對朋友的敬稱"],["老爺","對有錢、有地位年長者的敬稱"],["相公","婦女對丈夫的敬稱，或對讀書人的敬稱"]]
    },
    { title:"謙詞（稱自己）", cols:["謙詞","釋義"],
      rows:[["竊、不才","自謙才疏學淺"],["在下、敝人、鄙人","謙稱自己"],["妾","古代女子自稱的謙詞"],["孤","古代王侯的謙稱，同「寡人」"],["晚生","後進對前輩的謙稱"],["後學","對前輩學者的謙稱"],["小子","晚輩對尊長的自稱"],["老朽","老年人自謙的稱呼，同「老夫」"]]
    },
    { title:"常用禮貌詞語", cols:["禮貌詞","釋義"],
      rows:[["賞光","請人光臨的敬語"],["光臨","稱賓客來訪的敬詞"],["奉陪","陪伴的敬詞"],["失陪","不能陪伴的客套話"],["失迎","對來訪客人表示失於迎候的客氣話"],["失敬","對人自責疏忽的客套話"],["叨擾","謝人款待的客套用語"],["久仰","初次見面時的客套話"],["留步","客人請主人不必遠送的謙詞"],["貴庚","詢問他人年齡的敬詞"],["貴幹","稱人所作之事的敬詞"],["獻醜","向人表露自己技能時的謙詞"],["承讓","將勝利歸因於承蒙輸家禮讓的謙詞"],["包涵","請人諒解的謙詞"],["笑納","餽贈禮物時，請人接受的客氣話"],["心領","婉拒別人好意的客套話"],["指教","請人指正教導"],["高見","尊稱別人的意見"],["冒昧","自謙言行鹵莽"],["勞駕","煩請別人做事的客套話"]]
    }
  ],
  quiz:[
    q("「陛下」是用來稱呼？",["君王","將帥","朋友","同輩"],0,"陛下為對君王的敬稱。"),
    q("下列何者是「謙詞」，而非「敬詞」？",["閣下","足下","在下","兄臺"],2,"在下是謙稱自己的謙詞；閣下、足下、兄臺皆為敬詞，用來稱呼對方。"),
    q("初次見面想表達仰慕已久，應說？",["久仰","久違","留步","失陪"],0,"久仰是初次見面時表達仰慕已久的客套話；久違則是好久不見的客套話。"),

/* helper to build question object */
function q(text, options, answerIndex, explain, allowNoAnswer){
  return { text, options, answerIndex, explain, allowNoAnswer: !!allowNoAnswer };
}

/* =========================================================
   RENDER
   ========================================================= */
const railEl = document.getElementById('rail');
const stationsEl = document.getElementById('stations');
let totalQuestions = 0;
let totalAnswered = 0;
let totalCorrect = 0;
const stationState = {}; // id -> {answered, correct}

STATIONS.forEach(st=>{
  totalQuestions += st.quiz.length;
  stationState[st.id] = {answered:0, correct:0};

  // rail tab
  const tab = document.createElement('button');
  tab.className = 'tab';
  tab.style.setProperty('--tab-c', st.color);
  tab.innerHTML = `<div><div>${st.title}</div><small class="mono">${st.num}</small></div>`;
  tab.onclick = ()=> document.getElementById(st.id).scrollIntoView({behavior:'smooth', block:'start'});
  railEl.appendChild(tab);

  // section
  const section = document.createElement('section');
  section.className = 'station';
  section.id = st.id;
  section.style.setProperty('--tab-c', st.color);

  let refsHtml = '';
  st.refs.forEach(ref=>{
    const rows = ref.rows.map(r=>`<tr>${r.map((c,i)=> i===0? `<td class="term">${c}</td>` : `<td>${c}</td>`).join('')}</tr>`).join('');
    refsHtml += `
      <details class="ref">
        <summary>${ref.title}</summary>
        <div class="tbl-wrap">
          <table class="ref-table">
            <thead><tr>${ref.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </details>`;
  });

  section.innerHTML = `
    <div class="station-head">
      <span class="station-num mono">${st.num}</span>
      <h2>${st.title}</h2>
    </div>
    <p class="station-desc">${st.desc}</p>
    <div class="page">${refsHtml}</div>
    <div class="page quiz-box">
      <h3>小測驗・${st.title}</h3>
      <div class="qcount">共 ${st.quiz.length} 題，答對蓋章、答錯留墨痕，可重複作答其他題。</div>
      <div class="q-list" id="qlist-${st.id}"></div>
      <div class="station-score" id="score-${st.id}"><span class="mini-seal">印</span><span>本站戰績：<b id="scoretext-${st.id}">0 / 0</b></span></div>
    </div>
  `;
  stationsEl.appendChild(section);

  const qlist = section.querySelector(`#qlist-${st.id}`);
  st.quiz.forEach((item, qi)=>{
    const card = document.createElement('div');
    card.className = 'q-card';
    const optsHtml = item.options.map((opt,oi)=>`<button class="opt" data-oi="${oi}">${opt}</button>`).join('');
    card.innerHTML = `
      <div class="q-text">${qi+1}. ${item.text}</div>
      <div class="opts">${optsHtml}</div>
      <div class="feedback"></div>
    `;
    const optBtns = card.querySelectorAll('.opt');
    const feedback = card.querySelector('.feedback');
    let answered = false;
    optBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(answered) return;
        answered = true;
        const chosen = parseInt(btn.dataset.oi,10);
        const isCorrect = !item.allowNoAnswer && chosen === item.answerIndex;
        optBtns.forEach(b=> b.classList.add('disabled'));
        if(item.allowNoAnswer){
          btn.classList.add('correct');
          btn.insertAdjacentHTML('beforeend', ' <span class="stamp c">析</span>');
        } else if(isCorrect){
          btn.classList.add('correct');
          btn.insertAdjacentHTML('beforeend', ' <span class="stamp c">✓</span>');
        } else {
          btn.classList.add('wrong');
          btn.insertAdjacentHTML('beforeend', ' <span class="stamp w">✗</span>');
          optBtns[item.answerIndex] && optBtns[item.answerIndex].classList.add('correct');
        }
        feedback.textContent = item.explain;
        feedback.classList.add('show');

        stationState[st.id].answered++;
        totalAnswered++;
        if(isCorrect || item.allowNoAnswer){
          stationState[st.id].correct++;
          totalCorrect++;
        }
        updateScores();
      });
    });
    qlist.appendChild(card);
  });
});

document.getElementById('totalQ').textContent = totalQuestions;

function updateScores(){
  STATIONS.forEach(st=>{
    const s = stationState[st.id];
    const el = document.getElementById(`scoretext-${st.id}`);
    if(el) el.textContent = `${s.correct} / ${s.answered}`;
  });
  document.getElementById('scoreN').textContent = `${totalCorrect}/${totalAnswered}`;
}

function resetAll(){
  location.reload();
}

/* highlight active tab on scroll */
const tabs = Array.from(document.querySelectorAll('.tab'));
const sectionsForScroll = STATIONS.map(s=>document.getElementById(s.id));
window.addEventListener('scroll', ()=>{
  let idx = 0;
  sectionsForScroll.forEach((sec,i)=>{
    if(sec.getBoundingClientRect().top - 100 <= 0) idx = i;
  });
  tabs.forEach((t,i)=> t.classList.toggle('active', i===idx));
}, {passive:true});
</script>
