<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活用成語 · 互動複習站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F3ECDA;
  --paper-deep:#EAE0C8;
  --ink:#2A2420;
  --ink-soft:#5C5245;
  --seal:#AA3B32;
  --seal-deep:#8A2E27;
  --jade:#4C7860;
  --jade-deep:#365747;
  --indigo:#3C5A78;
  --gold:#B8863A;
  --line:#D8CBA9;
  --card:#FBF8EF;
  --shadow: 0 2px 0 rgba(42,36,32,0.06), 0 10px 24px -14px rgba(42,36,32,0.35);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  background:
    radial-gradient(1200px 500px at 10% -10%, #F8F1DE 0%, transparent 60%),
    radial-gradient(900px 500px at 110% 10%, #EFE4C8 0%, transparent 55%),
    var(--paper);
  color:var(--ink);
  font-family:"Noto Sans TC", sans-serif;
  -webkit-font-smoothing:antialiased;
}
.serif{font-family:"Noto Serif TC", serif;}
.texture{
  position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 37px, rgba(42,36,32,0.035) 38px);
}
.wrap{position:relative; z-index:1; max-width:1080px; margin:0 auto; padding:0 20px 100px;}

header.hero{ padding:56px 0 34px; text-align:center; position:relative; }
.stamp{
  display:inline-flex; align-items:center; justify-content:center;
  width:56px; height:56px; border-radius:50%;
  background:var(--seal); color:#fff;
  font-family:"Noto Serif TC", serif; font-weight:900; font-size:17px;
  box-shadow: var(--shadow);
  transform: rotate(-6deg);
  margin-bottom:14px;
  letter-spacing:0px;
}
h1.title{ font-size:clamp(32px,6vw,54px); margin:0 0 10px; font-weight:900; letter-spacing:2px; }
h1.title span{color:var(--seal);}
p.subtitle{ color:var(--ink-soft); font-size:16px; margin:0 auto; max-width:560px; line-height:1.7; }

nav.stations{
  position:sticky; top:0; z-index:20;
  display:flex; gap:8px; overflow-x:auto;
  padding:12px 0; margin-bottom:28px;
  background:linear-gradient(var(--paper) 78%, transparent);
  backdrop-filter: blur(2px);
  scrollbar-width:none;
}
nav.stations::-webkit-scrollbar{display:none;}
.station-btn{
  flex:0 0 auto; display:flex; align-items:center; gap:8px;
  padding:10px 16px; border-radius:14px; border:1.5px solid var(--line);
  background:var(--card); color:var(--ink-soft);
  font-family:"Noto Sans TC"; font-weight:700; font-size:14px;
  cursor:pointer; transition:.18s ease; white-space:nowrap;
}
.station-btn .num{
  width:22px; height:22px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  background:var(--paper-deep); color:var(--ink-soft);
  font-size:12px; font-weight:900; font-family:"Noto Serif TC";
}
.station-btn:hover{ transform:translateY(-1px); border-color:var(--seal); color:var(--ink);}
.station-btn.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.station-btn.active .num{ background:var(--seal); color:#fff; }

section.panel{ display:none; animation:fade .35s ease; }
section.panel.active{ display:block; }
@keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

.panel-head{
  display:flex; align-items:flex-end; justify-content:space-between; gap:16px;
  flex-wrap:wrap; margin-bottom:18px; border-bottom:2px solid var(--ink); padding-bottom:12px;
}
.panel-head h2{ font-size:clamp(22px,4vw,30px); margin:0; font-weight:900; display:flex; align-items:center; gap:10px; }

.search-row{ margin-bottom:18px; }
.search-row input{
  width:100%; padding:12px 16px; border-radius:14px;
  border:1.5px solid var(--line); background:var(--card);
  font-family:"Noto Sans TC"; font-size:15px; color:var(--ink);
}
.search-row input:focus{ outline:2px solid var(--seal); outline-offset:1px; border-color:var(--seal); }

/* ---- Station 1: category chips + two-column cards ---- */
.cat-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
.cat-chip{
  padding:8px 15px; border-radius:999px; border:1.5px solid var(--line);
  background:var(--card); font-size:13px; font-weight:700; color:var(--ink-soft);
  cursor:pointer; transition:.15s; display:flex; align-items:center; gap:7px;
}
.cat-chip .dot{ width:9px; height:9px; border-radius:50%; }
.cat-chip.on{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.cat-chip.on .dot{ box-shadow:0 0 0 2px rgba(255,255,255,.5); }

.pair-group{ margin-bottom:28px; }
.pair-group-title{
  display:flex; align-items:center; gap:8px; margin-bottom:12px;
  font-family:"Noto Serif TC"; font-weight:700; font-size:16px; color:var(--ink);
}
.pair-group-title .dot{ width:11px; height:11px; border-radius:50%; }
.pair-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
.pair-card{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:16px 18px; box-shadow:var(--shadow); border-top-width:4px; border-top-style:solid;
}
.pair-cols{ display:flex; align-items:stretch; gap:12px; }
.pair-col{ flex:1; min-width:0; }
.pair-col b{ font-family:"Noto Serif TC"; font-size:16.5px; }
.pair-col p{ margin:5px 0 0; font-size:12.5px; color:var(--ink-soft); line-height:1.55; }
.pair-vs{
  flex:0 0 auto; align-self:center; font-size:11px; color:var(--ink-soft);
  border-left:1px dashed var(--line); border-right:1px dashed var(--line); padding:0 8px;
  writing-mode:vertical-rl; opacity:.6;
}

/* ---- Station 2 story cards ---- */
.story-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.story-card{
  background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:18px; box-shadow:var(--shadow); cursor:pointer;
  transition:.2s ease; min-height:118px; position:relative; overflow:hidden;
}
.story-card:hover{ transform:translateY(-2px); border-color:var(--indigo); }
.story-card h3{ margin:0 0 6px; font-size:18px; font-family:"Noto Serif TC"; font-weight:700; color:var(--indigo); }
.story-card .meaning{ font-size:13.5px; color:var(--ink); line-height:1.6; }
.story-card .story{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--line); font-size:12.5px; color:var(--ink-soft); line-height:1.6; display:none; }
.story-card.open .story{ display:block; }
.story-card .flip-hint{ position:absolute; top:14px; right:16px; font-size:11px; color:var(--indigo); opacity:.6; }

/* ---- Station 3 tag cloud ---- */
.tag-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
.tag-card{ background:var(--card); border:1px solid var(--line); border-left:5px solid var(--seal); border-radius:10px; padding:12px 14px; cursor:pointer; }
.tag-card b{ font-family:"Noto Serif TC"; font-size:16px; }
.tag-card p{ margin:6px 0 0; font-size:12.5px; color:var(--ink-soft); line-height:1.55; display:none; }
.tag-card.open p{ display:block; }

/* ---- Station 4 synonym clusters ---- */
.syn-list{ display:flex; flex-direction:column; gap:12px; }
.syn-card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 18px; box-shadow:var(--shadow); }
.syn-top{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.syn-top b{ font-family:"Noto Serif TC"; font-size:18px; color:var(--jade-deep); }
.syn-top span.m{ font-size:13.5px; color:var(--ink-soft); }
.syn-tags{ margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
.syn-tags em{ font-style:normal; font-size:12.5px; padding:4px 10px; border-radius:999px; background:var(--paper-deep); color:var(--ink); border:1px solid var(--line); }

/* ---- Station 5 structure ---- */
.struct-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
.struct-card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; border-left:5px solid var(--gold); }
.struct-card b{ font-family:"Noto Serif TC"; font-size:16px; }
.struct-card p{ margin:5px 0 0; font-size:12.5px; color:var(--ink-soft); line-height:1.5; }

/* ---- Station 6 quiz ---- */
.unit-picker{ display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
.unit-card{
  background:var(--card); border:1.5px solid var(--line); border-radius:16px;
  padding:20px 16px; text-align:center; cursor:pointer; transition:.18s;
}
.unit-card:hover{ transform:translateY(-2px); border-color:var(--seal); }
.unit-card .emoji{ font-size:34px; display:block; margin-bottom:8px; }
.unit-card .name{ font-family:"Noto Serif TC"; font-weight:700; font-size:15px; }
.unit-card .cnt{ font-size:12px; color:var(--ink-soft); margin-top:4px; }

.quiz-shell{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:26px; box-shadow:var(--shadow); }
.quiz-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
.quiz-progress{ font-size:13px; color:var(--ink-soft); font-weight:700; }
.quiz-score{ font-size:13px; color:var(--jade-deep); font-weight:700; }
.progress-bar{ height:6px; border-radius:99px; background:var(--paper-deep); overflow:hidden; margin-bottom:22px; }
.progress-fill{ height:100%; background:var(--seal); width:0%; transition:width .3s; }
.quiz-q{ font-family:"Noto Serif TC"; font-size:clamp(18px,3vw,22px); font-weight:700; line-height:1.6; margin-bottom:20px; }
.quiz-emoji-clue{ font-size:44px; text-align:center; margin:6px 0 20px; letter-spacing:6px; }
.quiz-opts{ display:grid; gap:10px; margin-bottom:18px; }
.quiz-opt{
  text-align:left; padding:13px 16px; border-radius:12px; border:1.5px solid var(--line); background:var(--paper);
  font-family:"Noto Sans TC"; font-size:15px; cursor:pointer; transition:.15s; display:flex; gap:10px; align-items:center;
}
.quiz-opt .letter{ width:24px;height:24px;border-radius:50%; background:var(--paper-deep); display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex:0 0 auto; }
.quiz-opt:hover:not(.locked){ border-color:var(--indigo); }
.quiz-opt.correct{ background:#E5EFE6; border-color:var(--jade); color:var(--jade-deep); font-weight:700;}
.quiz-opt.correct .letter{ background:var(--jade); color:#fff;}
.quiz-opt.wrong{ background:#F5E4E1; border-color:var(--seal); color:var(--seal-deep); font-weight:700;}
.quiz-opt.wrong .letter{ background:var(--seal); color:#fff;}
.quiz-explain{ font-size:13.5px; color:var(--ink-soft); background:var(--paper-deep); border-radius:12px; padding:12px 14px; line-height:1.6; display:none; margin-bottom:16px; }
.quiz-explain.show{ display:block; }
.quiz-nav{ display:flex; justify-content:space-between; gap:10px; }
.btn{ padding:11px 22px; border-radius:12px; border:none; cursor:pointer; font-family:"Noto Sans TC"; font-weight:700; font-size:14px; background:var(--ink); color:var(--paper); transition:.15s; }
.btn:hover{ opacity:.85; }
.btn:disabled{ opacity:.35; cursor:not-allowed; }
.btn.ghost{ background:transparent; color:var(--ink); border:1.5px solid var(--ink); }
.quiz-done{ text-align:center; padding:20px 0; }
.quiz-done .big{ font-family:"Noto Serif TC"; font-size:48px; font-weight:900; color:var(--seal); }
.quiz-done p{ color:var(--ink-soft); font-size:15px; }
.cat-pill{ display:inline-block; font-size:11.5px; padding:3px 10px; border-radius:999px; background:var(--indigo); color:#fff; margin-bottom:10px; font-weight:700; }

footer{ text-align:center; padding:30px 0 10px; color:var(--ink-soft); font-size:12.5px; }

@media (max-width:600px){
  .wrap{padding:0 14px 80px;}
  header.hero{padding:36px 0 24px;}
  .pair-cols{ flex-direction:column; }
  .pair-vs{ writing-mode:horizontal-tb; border-left:none; border-right:none; border-top:1px dashed var(--line); border-bottom:1px dashed var(--line); padding:4px 0; text-align:center; }
}
</style>
</head>
<body>
<div class="texture"></div>
<div class="wrap">

  <header class="hero">
    <div class="stamp">成語</div>
    <h1 class="title">活用<span>成語</span>複習站</h1>
    <p class="subtitle">把講義裡的五個學習小站，變成可以點、可以找、可以考的互動版。先逛一逛卡片建立印象，再到「加碼挑戰」測試自己吧！</p>
  </header>

  <nav class="stations" id="stationNav"></nav>

  <!-- ============ STATION 1 ============ -->
  <section class="panel" data-panel="s1">
    <div class="panel-head"><h2>第1站・容易混淆的成語</h2></div>
    <div class="cat-chips" id="catChipsS1"></div>
    <div class="search-row"><input type="text" id="searchS1" placeholder="搜尋成語或釋義…（例如：自食）"></div>
    <div id="gridS1"></div>
  </section>

  <!-- ============ STATION 2 ============ -->
  <section class="panel" data-panel="s2">
    <div class="panel-head"><h2>第2站・成語中的人名、地名</h2></div>
    <div class="search-row"><input type="text" id="searchS2" placeholder="搜尋成語或釋義…"></div>
    <h3 class="serif" style="margin:6px 0 10px;color:var(--indigo);">☯ 人名篇</h3>
    <div class="story-grid" id="gridS2names"></div>
    <h3 class="serif" style="margin:24px 0 10px;color:var(--indigo);">🗺 地名篇</h3>
    <div class="story-grid" id="gridS2places"></div>
  </section>

  <!-- ============ STATION 3 ============ -->
  <section class="panel" data-panel="s3">
    <div class="panel-head"><h2>第3站・貶義成語</h2></div>
    <div class="search-row"><input type="text" id="searchS3" placeholder="搜尋成語或釋義…"></div>
    <div class="tag-grid" id="gridS3"></div>
  </section>

  <!-- ============ STATION 4 ============ -->
  <section class="panel" data-panel="s4">
    <div class="panel-head"><h2>第4站・義近成語</h2></div>
    <div class="search-row"><input type="text" id="searchS4" placeholder="搜尋成語或釋義…"></div>
    <div class="syn-list" id="gridS4"></div>
  </section>

  <!-- ============ STATION 5 ============ -->
  <section class="panel" data-panel="s5">
    <div class="panel-head"><h2>第5站・成語的特殊結構</h2></div>
    <div class="search-row"><input type="text" id="searchS5" placeholder="搜尋成語或釋義…"></div>
    <div class="struct-grid" id="gridS5"></div>
  </section>

  <!-- ============ STATION 6: QUIZ ============ -->
  <section class="panel" data-panel="s6">
    <div class="panel-head"><h2>第6站・加碼挑戰</h2></div>
    <div id="quizArea"></div>
  </section>

  <footer>依講義「單元陸．活用成語」整理製作，僅供個人複習使用 ✦</footer>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */

const CATS = {
  opp:  {label:"反義對照",       color:"#AA3B32"},
  eval: {label:"褒貶相對",       color:"#B8863A"},
  ctx:  {label:"對象／情境不同", color:"#3C5A78"},
  look: {label:"形近義異",       color:"#4C7860"},
};

// [idiomA, meaningA, idiomB, meaningB, category]
const confused = [
["自食其力","憑藉自己的力量養活自己。","自食其果","由自己承擔做壞事的後果。","eval"],
["以身作則","用自己言行作他人榜樣。","以身試法","不顧法律而故意犯法。","eval"],
["鴻鵠之志","比喻志向遠大。","心有鴻鵠","比喻不專心。","eval"],
["所向披靡","力量所到之處，敵人紛紛潰退。","望風披靡","被敵人氣勢震懾，未戰先潰敗。","ctx"],
["功成不居","建立了功勞而不歸功於自己。","功敗垂成","事情在即將成功時失敗了。","look"],
["大勢所趨","整個局勢發展的趨向。","大勢已去","整個局勢已經無法挽回。","look"],
["差強人意","大體上尚能令人勉強滿意。","強人所難","勉強別人做能力不及之事。","look"],
["目不交睫","心情不安不能入眠，或工作緊張勞碌。","目不見睫","比喻人無自知之明，不能看見自己的過失。","look"],
["急公好義","熱心公益，喜愛助人。","急功近利","急於求得，貪求利益。","eval"],
["韞櫝藏珠","比喻懷才退隱。","買櫝還珠","比喻捨本逐末，取捨失當。","look"],
["調虎離山","誘使對方離開據點，以便趁機行事。","縱虎歸山","放走敵人，後患無窮。","opp"],
["春花秋月","美好的時光與景物。","鏡花水月","比喻空幻不實在。","eval"],
["九牛一毛","極大數量中的一小部分。","一毛不拔","譏諷人非常吝嗇。","look"],

["兔死狐悲","比喻因同類的死亡而感到悲傷。","兔死狗烹","比喻事成之後，出力的人遭殺戮或見棄。","look"],
["窮兵黷武","恣意運用兵力，發動戰爭。","厲兵秣馬","磨利兵器、餵飽馬匹，指完成作戰準備。","eval"],
["妄自菲薄","過於自卑而不知自重。","妄自尊大","驕矜自大，自命不凡。","opp"],
["少不更事","年紀輕，閱歷淺薄。","少年老成","比喻年紀雖輕，舉止卻成熟穩重。","opp"],
["坐吃山空","只消費而不從事生產，以致把家產耗盡。","坐收漁利","指利用別人彼此間的衝突矛盾而獲利。","look"],
["雪中送炭","在別人艱困之時，給予適時的援助。","抱薪救火","用錯方法，而致禍害加深。","opp"],
["屈指可數","形容數量很少。","指不勝屈","形容數量很多。","opp"],
["孺慕之情","小兒愛慕父母。","舐犢情深","比喻父母疼愛子女之深情。","ctx"],
["望塵莫及","趕不上。","望其項背","趕得上。","opp"],
["門可羅雀","賓客稀少，門庭冷落。","萬人空巷","形容擁擠、熱鬧的盛況。","opp"],
["洛陽紙貴","比喻著作風行，流傳甚廣。","米珠薪桂","比喻物價昂貴。","ctx"],
["重作馮婦","比喻重操舊業。","琵琶別抱","婦女改嫁或女子另結新歡。","ctx"],
["如喪考妣","好像死了父母一般，比喻悲痛至極（不可形容父母死亡）。","恩同父母","如同父母對子女般的恩情（不可形容親父母）。","ctx"],
["情同手足","情感如親兄弟般深厚（不可形容親兄弟）。","手足情深","形容兄弟姐妹間感情深厚（形容親兄弟）。","ctx"],
["鬼斧神工","技藝精巧非人力所及（形容自然美景）。","巧奪天工","雖是人工製造，但精巧勝過天然（形容人造美景）。","ctx"],
["曇花一現","比喻一出現便迅速消失（時間短暫）。","滄海一粟","比喻渺小，微不足道（空間渺小）。","ctx"],
["如花似玉","形容女子姿容絕美。","如花似錦","形容風景或前程美好、光明。","ctx"],
["魚雁往返","互通訊息。","雁杳魚沉","比喻音訊全無。","opp"],
["胸無城府","為人坦率正直，沒有心機。","胸無點墨","比喻人毫無學識。","look"],
["咬文嚼字","在詞句上斟酌推敲。","咬牙切齒","非常憤怒的樣子。","look"],

/* ============================================================
   RENDER HELPERS
   ============================================================ */

const stations = [
  {id:"s1", label:"易混淆成語"},
  {id:"s2", label:"人名地名"},
  {id:"s3", label:"貶義成語"},
  {id:"s4", label:"義近成語"},
  {id:"s5", label:"特殊結構"},
  {id:"s6", label:"加碼挑戰"},
];

const navEl = document.getElementById('stationNav');
stations.forEach((s,i)=>{
  const b = document.createElement('button');
  b.className = 'station-btn' + (i===0?' active':'');
  b.dataset.target = s.id;
  b.innerHTML = `<span class="num">${i+1}</span>${s.label}`;
  b.onclick = ()=>switchStation(s.id);
  navEl.appendChild(b);
});
function switchStation(id){
  document.querySelectorAll('.station-btn').forEach(b=>b.classList.toggle('active', b.dataset.target===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.dataset.panel===id));
  window.scrollTo({top:0, behavior:'smooth'});
}
document.querySelector('.panel[data-panel="s1"]').classList.add('active');

/* ---------- Station 1 render (category-based) ---------- */
let activeCats = new Set(Object.keys(CATS));
(function buildCatChips(){
  const bar = document.getElementById('catChipsS1');
  Object.entries(CATS).forEach(([key,c])=>{
    const chip = document.createElement('button');
    chip.className = 'cat-chip on';
    chip.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.label}`;
    chip.onclick = ()=>{
      if(activeCats.has(key)){ activeCats.delete(key); chip.classList.remove('on'); }
      else { activeCats.add(key); chip.classList.add('on'); }
      renderS1(document.getElementById('searchS1').value);
    };
    bar.appendChild(chip);
  });
})();

function renderS1(searchTerm){
  const grid = document.getElementById('gridS1');
  grid.innerHTML = '';
  const term = (searchTerm||'').trim();
  Object.entries(CATS).forEach(([key,c])=>{
    if(!activeCats.has(key)) return;
    const items = confused.filter(p=>p[4]===key && (!term || p[0].includes(term)||p[1].includes(term)||p[2].includes(term)||p[3].includes(term)));
    if(!items.length) return;
    const group = document.createElement('div');
    group.className = 'pair-group';
    group.innerHTML = `<div class="pair-group-title"><span class="dot" style="background:${c.color}"></span>${c.label}<span style="font-weight:400;color:var(--ink-soft);font-size:13px;">（${items.length} 組）</span></div>`;
    const g = document.createElement('div');
    g.className = 'pair-grid';
    items.forEach(([a,am,b,bm])=>{
      const card = document.createElement('div');
      card.className = 'pair-card';
      card.style.borderTopColor = c.color;
      card.innerHTML = `
        <div class="pair-cols">
          <div class="pair-col"><b>${a}</b><p>${am}</p></div>
          <div class="pair-vs">對照</div>
          <div class="pair-col"><b>${b}</b><p>${bm}</p></div>
        </div>`;
      g.appendChild(card);
    });
    group.appendChild(g);
    grid.appendChild(group);
  });
  if(!grid.children.length){ grid.innerHTML = '<p style="color:var(--ink-soft);">沒有符合的結果，換個關鍵字或分類試試。</p>'; }
}
document.getElementById('searchS1').addEventListener('input', e=>renderS1(e.target.value));
renderS1();

/* ---------- Station 2 render ---------- */
function renderS2(term){
  const t = (term||'').trim();
  const gN = document.getElementById('gridS2names');
  const gP = document.getElementById('gridS2places');
  gN.innerHTML=''; gP.innerHTML='';
  function makeCard(arr){
    const [idiom, meaning, story] = arr;
    const c = document.createElement('div');
    c.className='story-card';
    c.innerHTML = `<span class="flip-hint">點我 ↺</span><h3>${idiom}</h3><div class="meaning">${meaning}</div><div class="story">📖 ${story}</div>`;
    c.onclick = ()=>c.classList.toggle('open');
    return c;
  }
  names.forEach(arr=>{
    if(t && !(arr[0].includes(t)||arr[1].includes(t)||arr[2].includes(t))) return;
    gN.appendChild(makeCard(arr));
  });
  places.forEach(arr=>{
    if(t && !(arr[0].includes(t)||arr[1].includes(t)||arr[2].includes(t))) return;
    gP.appendChild(makeCard(arr));
  });
}
document.getElementById('searchS2').addEventListener('input', e=>renderS2(e.target.value));
renderS2();

/* ---------- Station 3 render ---------- */
function renderS3(term){
  const t = (term||'').trim();
  const grid = document.getElementById('gridS3');
  grid.innerHTML='';
  derog.forEach(([idiom, meaning])=>{
    if(t && !(idiom.includes(t)||meaning.includes(t))) return;

document.getElementById('searchS3').addEventListener('input', e=>renderS3(e.target.value));

/* ---------- Station 4 render ---------- */

  const t = (term||'').trim();

/* ============================================================
   QUIZ ENGINE (Station 6) — unit picker + per-unit quiz
   ============================================================ */
let curUnit = null;
let quizOrder = [];
let qi = 0;
let score = 0;
let answered = false;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function renderUnitPicker(){
  const area = document.getElementById('quizArea');
  const grid = document.createElement('div');
  grid.className = 'unit-picker';
  quizUnits.forEach(u=>{
    const c = document.createElement('div');
    c.className = 'unit-card';
    c.innerHTML = `<span class="emoji">${u.icon}</span><div class="name">${u.title}</div><div class="cnt">共 ${u.qs.length} 題</div>`;
    c.onclick = ()=>{ curUnit = u; startQuiz(); };
    grid.appendChild(c);
  });
  area.innerHTML = '';
  area.appendChild(grid);
}

function startQuiz(){
  quizOrder = shuffle(curUnit.qs.map((_,i)=>i));
  qi = 0; score = 0; answered = false;
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const area = document.getElementById('quizArea');
  if(qi >= quizOrder.length){
    area.innerHTML = `
      <div class="quiz-shell">
        <div class="quiz-done">
          <div class="big">${score} / ${quizOrder.length}</div>
          <p>${score===quizOrder.length ? '滿分！這個單元你已經完全掌握了 🎉' : score>=quizOrder.length*0.7 ? '很不錯！再複習幾個易混淆的組合就更穩了。' : '沒關係，回頭逛逛前面的卡片，再挑戰一次！'}</p>
          <div style="display:flex; gap:10px; justify-content:center; margin-top:16px;">
            <button class="btn" onclick="startQuiz()">再玩一次</button>
            <button class="btn ghost" onclick="renderUnitPicker()">選其他單元</button>
          </div>
        </div>
      </div>`;
    return;
  }
  answered = false;
  const q = curUnit.qs[quizOrder[qi]];
  const letters = ['A','B','C','D'];
  const isEmoji = curUnit.type === 'emoji';
  area.innerHTML = `
    <div class="quiz-shell">
      <div class="quiz-top">
        <div class="quiz-progress">${curUnit.icon} ${curUnit.title}　第 ${qi+1} / ${quizOrder.length} 題</div>
        <div class="quiz-score">得分 ${score}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(qi/quizOrder.length)*100}%"></div></div>
      ${isEmoji
        ? `<div class="quiz-q" style="text-align:center;">這組 emoji 代表哪一個成語？</div><div class="quiz-emoji-clue">${q.clue}</div>`
        : `<div class="quiz-q">${q.q}</div>`
      }
      <div class="quiz-opts" id="quizOpts">
        ${q.opts.map((o,idx)=>`<button class="quiz-opt" data-idx="${idx}"><span class="letter">${letters[idx]}</span>${o}</button>`).join('')}
      </div>
      <div class="quiz-explain" id="quizExplain">${q.ex}</div>
      <div class="quiz-nav">
        <button class="btn ghost" onclick="renderUnitPicker()">← 選其他單元</button>
        <button class="btn" id="nextBtn" disabled>下一題</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.quiz-opt').forEach(btn=>{
    btn.onclick = ()=>{
      if(answered) return;
      answered = true;
      const idx = Number(btn.dataset.idx);
      document.querySelectorAll('.quiz-opt').forEach(b=>b.classList.add('locked'));
      if(idx === q.ans){
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        document.querySelector(`.quiz-opt[data-idx="${q.ans}"]`).classList.add('correct');
      }
      document.getElementById('quizExplain').classList.add('show');
      document.getElementById('nextBtn').disabled = false;
    };
  });
  document.getElementById('nextBtn').onclick = ()=>{ qi++; renderQuizQuestion(); };
}

renderUnitPicker();
</script>
